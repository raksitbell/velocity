<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Projects Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Custom scrollbar to match Notion's subtle look */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        notion: {
                            bg: '#191919',
                            sidebar: '#202020',
                            card: '#252525',
                            hover: '#2C2C2C',
                            border: '#333333',
                            blue: '#2383E2',
                            blueDark: '#1D282E',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-notion-bg text-zinc-300 min-h-screen flex flex-col antialiased selection:bg-blue-500/30">

    <!-- Top Navigation Bar -->
    <header class="h-12 flex items-center justify-between px-3 text-sm sticky top-0 z-50 bg-notion-bg">
        <div class="flex items-center gap-2">
            <button class="p-1 hover:bg-notion-hover rounded text-zinc-400 transition-colors">
                <i data-lucide="menu" class="w-4 h-4"></i>
            </button>
            <div class="flex items-center gap-1 text-zinc-400">
                <span
                    class="flex items-center gap-1 hover:bg-notion-hover px-1.5 py-0.5 rounded cursor-pointer transition-colors text-zinc-100">
                    <i data-lucide="search" class="w-4 h-4 text-blue-400"></i>
                    <span>Projects</span>
                </span>
                <span class="text-zinc-600">/</span>
                <span
                    class="flex items-center gap-1 hover:bg-notion-hover px-1.5 py-0.5 rounded cursor-pointer transition-colors">
                    <i data-lucide="lock" class="w-3 h-3"></i>
                    <span>Private</span>
                </span>
            </div>
        </div>
        <div class="flex items-center gap-3 text-xs">
            <span class="text-zinc-500 hidden sm:block">Edited just now</span>
            <button
                class="flex items-center gap-1 text-zinc-300 hover:bg-notion-hover px-2 py-1 rounded transition-colors">
                <span>Share</span>
            </button>
            <button class="p-1 hover:bg-notion-hover rounded text-zinc-400 transition-colors">
                <i data-lucide="star" class="w-4 h-4"></i>
            </button>
            <button class="p-1 hover:bg-notion-hover rounded text-zinc-400 transition-colors">
                <i data-lucide="more-horizontal" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <!-- Scrollable Content -->
    <main class="flex-1 overflow-y-auto relative">

        <!-- Cover Image -->
        <div class="group relative h-48 w-full">
            <img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&amp;w=2000&amp;auto=format&amp;fit=crop"
                alt="Cover" class="w-full h-full object-cover opacity-80">
            <div class="absolute top-4 right-24 opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
                <button
                    class="bg-notion-bg/60 backdrop-blur-sm text-xs px-2 py-1 rounded hover:bg-notion-bg/80 text-zinc-300 border border-white/10 transition-colors">Change
                    cover</button>
                <button
                    class="bg-notion-bg/60 backdrop-blur-sm text-xs px-2 py-1 rounded hover:bg-notion-bg/80 text-zinc-300 border border-white/10 transition-colors">Reposition</button>
            </div>
        </div>

        <!-- Page Content -->
        <div class="max-w-[96rem] mx-auto px-4 sm:px-12 pb-20">

            <!-- Page Header -->
            <div class="group relative -mt-10 mb-8">
                <!-- Icon -->
                <div class="w-20 h-20 text-7xl mb-4 relative z-10 select-none">
                    <div class="relative">
                        <!-- Custom Icon Representation similar to screenshot -->
                        <i data-lucide="search" class="w-16 h-16 text-blue-500 stroke-[2.5]"></i>
                    </div>
                </div>

                <div
                    class="flex items-center gap-2 mb-1 opacity-0 group-hover:opacity-100 transition-opacity absolute -top-8 left-0">
                    <button
                        class="flex items-center gap-1.5 text-zinc-500 hover:text-zinc-300 text-xs transition-colors">
                        <i data-lucide="info" class="w-3.5 h-3.5"></i>
                        Hide description
                    </button>
                </div>

                <h1 class="text-4xl font-semibold text-zinc-100 tracking-tight mb-2">Projects</h1>
                <p class="text-base text-zinc-400 border-b border-notion-border pb-6">Manage and execute projects from
                    start to finish.</p>
            </div>

            <!-- View Controls -->
            <div
                class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 border-b border-notion-border pb-3">

                <!-- Tabs -->
                <div class="flex items-center gap-1 overflow-x-auto no-scrollbar">
                    <button
                        class="flex items-center gap-2 bg-notion-hover text-zinc-100 px-3 py-1.5 rounded-md text-sm font-medium transition-colors">
                        <i data-lucide="layout-kanban" class="w-4 h-4"></i>
                        By status
                    </button>
                    <button
                        class="flex items-center gap-2 text-zinc-400 hover:bg-notion-hover px-3 py-1.5 rounded-md text-sm font-medium transition-colors">
                        <i data-lucide="star" class="w-4 h-4"></i>
                        All projects
                    </button>
                    <button
                        class="flex items-center gap-2 text-zinc-400 hover:bg-notion-hover px-3 py-1.5 rounded-md text-sm font-medium transition-colors">
                        <i data-lucide="bar-chart-2" class="w-4 h-4"></i>
                        Gantt
                    </button>
                    <button
                        class="flex items-center gap-2 text-zinc-400 hover:bg-notion-hover px-3 py-1.5 rounded-md text-sm font-medium transition-colors">
                        <i data-lucide="user" class="w-4 h-4"></i>
                        My projects
                    </button>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-1 text-zinc-400">
                    <button class="p-1.5 hover:bg-notion-hover rounded transition-colors">
                        <i data-lucide="filter" class="w-4 h-4"></i>
                    </button>
                    <button class="p-1.5 hover:bg-notion-hover rounded transition-colors">
                        <i data-lucide="arrow-up-down" class="w-4 h-4"></i>
                    </button>
                    <button class="p-1.5 hover:bg-notion-hover rounded transition-colors">
                        <i data-lucide="zap" class="w-4 h-4"></i>
                    </button>
                    <button class="p-1.5 hover:bg-notion-hover rounded transition-colors">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </button>
                    <button class="p-1.5 hover:bg-notion-hover rounded transition-colors mr-2">
                        <i data-lucide="more-horizontal" class="w-4 h-4"></i>
                    </button>

                    <div class="flex">
                        <button
                            class="bg-notion-blue hover:bg-blue-600 text-white text-sm font-medium px-3 py-1.5 rounded-l rounded-r-none transition-colors border-r border-blue-600/50">New</button>
                        <button
                            class="bg-notion-blue hover:bg-blue-600 text-white px-1.5 py-1.5 rounded-r rounded-l-none transition-colors">
                            <i data-lucide="chevron-down" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Kanban Board -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-start">

                <!-- Column: Not Started -->
                <div class="flex flex-col gap-2 group/col">
                    <div class="flex items-center justify-between px-1 mb-1">
                        <div class="flex items-center gap-2">
                            <span
                                class="px-2 py-0.5 rounded-full bg-zinc-700/50 text-zinc-400 text-xs font-medium border border-zinc-700">Not
                                started</span>
                            <span class="text-zinc-500 text-xs">1</span>
                        </div>
                        <div class="flex gap-1 opacity-0 group-hover/col:opacity-100 transition-opacity">
                            <button class="text-zinc-500 hover:text-zinc-300"><i data-lucide="plus"
                                    class="w-4 h-4"></i></button>
                            <button class="text-zinc-500 hover:text-zinc-300"><i data-lucide="more-horizontal"
                                    class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <!-- Card -->
                    <div
                        class="bg-notion-card hover:bg-notion-hover border border-notion-border rounded-md shadow-sm p-3 cursor-pointer group transition-all">
                        <div class="flex items-start gap-2 mb-8">
                            <div class="mt-0.5">
                                <i data-lucide="search" class="w-4 h-4 text-blue-500"></i>
                            </div>
                            <span
                                class="text-sm font-medium text-zinc-200 group-hover:underline decoration-zinc-500 underline-offset-2">Frontend
                                design</span>
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between text-xs text-zinc-500 font-medium">
                                <span>0%</span>
                            </div>
                            <div class="h-1 w-full bg-zinc-700 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 w-0"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Add New -->
                    <button
                        class="flex items-center gap-2 text-zinc-500 hover:bg-notion-hover p-2 rounded text-sm transition-colors text-left group">
                        <i data-lucide="plus" class="w-4 h-4 text-zinc-600 group-hover:text-zinc-400"></i>
                        <span class="group-hover:text-zinc-300">New project</span>
                    </button>
                </div>

                <!-- Column: In Progress -->
                <div class="flex flex-col gap-2 group/col">
                    <div class="flex items-center justify-between px-1 mb-1">
                        <div class="flex items-center gap-2">
                            <span
                                class="px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-300 text-xs font-medium border border-blue-500/20">In
                                progress</span>
                            <span class="text-zinc-500 text-xs">1</span>
                        </div>
                        <div class="flex gap-1 opacity-0 group-hover/col:opacity-100 transition-opacity">
                            <button class="text-zinc-500 hover:text-zinc-300"><i data-lucide="plus"
                                    class="w-4 h-4"></i></button>
                            <button class="text-zinc-500 hover:text-zinc-300"><i data-lucide="more-horizontal"
                                    class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <!-- Card -->
                    <div
                        class="bg-notion-blueDark hover:bg-[#222E36] border border-blue-900/30 rounded-md shadow-sm p-3 cursor-pointer group transition-all">
                        <div class="flex items-start gap-2 mb-4">
                            <div class="mt-0.5 text-blue-400">
                                <i data-lucide="file-text" class="w-4 h-4 fill-current opacity-80"></i>
                            </div>
                            <span
                                class="text-sm font-medium text-zinc-100 group-hover:underline decoration-zinc-500 underline-offset-2">Design
                                Finder Hub</span>
                        </div>

                        <div class="space-y-3">
                            <div class="space-y-1">
                                <div class="flex justify-between text-xs text-zinc-400 font-medium">
                                    <span>0%</span>
                                </div>
                                <div class="h-1 w-full bg-zinc-700 rounded-full overflow-hidden">
                                    <div class="h-full bg-blue-500 w-0"></div>
                                </div>
                            </div>

                            <div class="flex flex-wrap gap-2">
                                <span
                                    class="bg-[#462020] text-[#FF9E9E] px-1.5 py-0.5 rounded text-[11px] font-medium border border-[#582626]">High</span>
                            </div>
                        </div>
                    </div>

                    <!-- Add New -->
                    <button
                        class="flex items-center gap-2 text-zinc-500 hover:bg-notion-hover p-2 rounded text-sm transition-colors text-left group">
                        <i data-lucide="plus" class="w-4 h-4 text-zinc-600 group-hover:text-zinc-400"></i>
                        <span class="group-hover:text-zinc-300">New project</span>
                    </button>
                </div>

                <!-- Column: Done -->
                <div class="flex flex-col gap-2 group/col">
                    <div class="flex items-center justify-between px-1 mb-1">
                        <div class="flex items-center gap-2">
                            <span
                                class="px-2 py-0.5 rounded-full bg-emerald-900/40 text-emerald-400 text-xs font-medium border border-emerald-900/40">Done</span>
                            <span class="text-zinc-500 text-xs">0</span>
                        </div>
                        <div class="flex gap-1 opacity-0 group-hover/col:opacity-100 transition-opacity">
                            <button class="text-zinc-500 hover:text-zinc-300"><i data-lucide="plus"
                                    class="w-4 h-4"></i></button>
                            <button class="text-zinc-500 hover:text-zinc-300"><i data-lucide="more-horizontal"
                                    class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <!-- Empty state/Add New for Done column -->
                    <button
                        class="flex items-center gap-2 text-zinc-500 hover:bg-notion-hover p-2 rounded text-sm transition-colors text-left group">
                        <i data-lucide="plus" class="w-4 h-4 text-zinc-600 group-hover:text-zinc-400"></i>
                        <span class="group-hover:text-zinc-300">New project</span>
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- Help Button -->
    <button
        class="fixed bottom-6 right-6 p-2 rounded-full bg-zinc-800 hover:bg-zinc-700 text-zinc-200 shadow-lg border border-zinc-700 transition-colors z-50">
        <i data-lucide="help-circle" class="w-6 h-6"></i>
    </button>

    <script>
        lucide.createIcons();
    </script>

</body>

</html>
